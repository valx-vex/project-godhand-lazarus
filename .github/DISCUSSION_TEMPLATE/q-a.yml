title: "[q-and-a] "
body:
  - type: markdown
    attributes:
      value: |
        Use `Q&A` for install help and usage questions. If the issue looks reproducible, a maintainer may turn it into a GitHub issue.
  - type: textarea
    id: question
    attributes:
      label: What do you need help with?
    validations:
      required: true
  - type: textarea
    id: state
    attributes:
      label: What have you already tried?
      description: Include commands or validation output when relevant.
      render: shell
