title: "[showcase] "
body:
  - type: markdown
    attributes:
      value: |
        Use `Show and tell` to share how you are using Godhand Lazarus in the wild.
  - type: input
    id: use-case
    attributes:
      label: Use case
      description: Short title for your workflow or experiment.
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: What did you build or recover?
      description: Share the stack, the outcome, and anything surprising.
    validations:
      required: true
