title: "[beta-feedback] "
body:
  - type: markdown
    attributes:
      value: |
        Use `General` for beta feedback: what felt strong, what felt confusing, and what this unlocked for you.
  - type: textarea
    id: context
    attributes:
      label: What did you try?
      description: Tell us the workflow or setup you used.
    validations:
      required: true
  - type: textarea
    id: feedback
    attributes:
      label: What feedback do you have?
      description: Focus on friction, clarity, and what mattered most.
    validations:
      required: true
